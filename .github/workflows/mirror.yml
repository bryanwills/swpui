name: Mirror to Codeberg

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH
        env:
          MIRROR_SSH_KEY: ${{ secrets.MIRROR_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${MIRROR_SSH_KEY:?MIRROR_SSH_KEY secret is not set}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$MIRROR_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          for i in 1 2 3; do
            ssh-keyscan -T 10 codeberg.org >> ~/.ssh/known_hosts && break
            echo "ssh-keyscan attempt $i failed, retrying..." >&2
            sleep 2
          done
          test -s ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Push to Codeberg
        run: |
          git remote add codeberg ssh://git@codeberg.org/beeb/swpui.git
          git push codeberg main
          tags=$(git tag --merged main)
          if [ -n "$tags" ]; then
            git push codeberg $tags
          fi
